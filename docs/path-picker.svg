<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="330" viewBox="0 0 1100 330" role="img" aria-labelledby="title desc">
  <title id="title">Herdr Local Path Picker</title>
  <desc id="desc">A terminal popup listing generated files with report.xlsx selected.</desc>
  <rect width="1100" height="330" rx="12" fill="#0d1117"/>
  <rect x="2" y="2" width="1096" height="326" rx="10" fill="none" stroke="#d29922" stroke-width="3"/>
  <text x="22" y="8" dominant-baseline="hanging" fill="#f2cc60" font-family="monospace" font-size="20"> Local Path Picker </text>
  <g fill="#e6edf3" font-family="monospace" font-size="18">
    <text x="24" y="48">Local Path Picker</text>
    <text x="24" y="76">3 files and folders found</text>
    <text x="24" y="104">Choose with ↑/↓, then press Enter to show the selected item in its folder · Esc closes</text>
  </g>
  <rect x="16" y="128" width="1068" height="30" fill="#d0d7de"/>
  <g font-family="monospace" font-size="18">
    <text x="24" y="150" fill="#0d1117">&gt; [File] /workspace/generated/report.xlsx</text>
    <text x="24" y="185" fill="#e6edf3">  [File] /workspace/generated/chart.png</text>
    <text x="24" y="220" fill="#e6edf3">  [File] /workspace/generated/summary.pdf</text>
    <text x="24" y="272" fill="#e6edf3">Selected path: /workspace/generated/report.xlsx</text>
    <text x="24" y="302" fill="#8b949e">Found in recent output: Generated `/workspace/generated/report.xlsx`</text>
  </g>
</svg>
